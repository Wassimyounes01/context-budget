<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" role="img" aria-label="Context Budget — product shot">
  <defs>
    <style>
      .t { font-family: ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace; font-size: 17px; }
      .title { font-family: ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace; font-size: 14px; fill: #7D8590; }
    </style>
    <clipPath id="panel"><rect x="1" y="1" width="1198" height="448" rx="14"/></clipPath>
  </defs>
  <rect x="1" y="1" width="1198" height="448" rx="14" fill="#0D1117" stroke="#30363D" stroke-width="1.5"/>
  <g clip-path="url(#panel)">
    <path d="M1,15 a14,14 0 0 1 14,-14 h1170 a14,14 0 0 1 14,14 v41 h-1198 z" fill="#161B22"/>
    <line x1="1" y1="56" x2="1199" y2="56" stroke="#30363D" stroke-width="1"/>
    <circle cx="1060" cy="30" r="300" fill="#6E8BF0" opacity="0.045"/>
    <circle cx="30" cy="28" r="7" fill="#FF5F57"/>
    <circle cx="54" cy="28" r="7" fill="#FEBC2E"/>
    <circle cx="78" cy="28" r="7" fill="#28C840"/>
    <text x="600" y="33" text-anchor="middle" class="title">context-budget — pressure · ceilings · ratchet</text>
    <rect x="0" y="56" width="4" height="394" fill="#6E8BF0" opacity="0.85"/>
    <text x="36" y="106" class="t"><tspan fill="#7D8590">$ </tspan><tspan fill="#6E8BF0" font-weight="600">node examples/demo.cjs</tspan></text>
    <text x="36" y="136" class="t" fill="#C9D1D9">fresh session      pressure=0       mode=FULL</text>
    <text x="36" y="166" class="t" fill="#C9D1D9">a few hours in     pressure=0.3906  mode=FULL</text>
    <text x="36" y="196" class="t" fill="#D29922">marathon session   pressure=0.9548  mode=EMERGENCY → compact</text>
    <text x="36" y="256" class="t"><tspan fill="#7D8590">$ </tspan><tspan fill="#6E8BF0" font-weight="600">node lib/ratchet.cjs</tspan></text>
    <text x="36" y="286" class="t" fill="#3FB950">AUTO-BASELINED 2 ceilings (measured +10% slack) → data/budgets.json</text>
    <text x="36" y="316" class="t" fill="#F85149">CONTEXT BLOAT: AGENTS.md 1821 &gt; ceiling 464 (+1357b) — exit 2</text>
    <text x="36" y="346" class="t" fill="#7D8590">compress/distill first · --rebase only if the growth is justified</text>
    <text x="36" y="376" class="t"><tspan fill="#7D8590">$ </tspan><tspan fill="#6E8BF0" font-weight="600">node lib/md-optimizer.cjs --apply</tspan></text>
    <text x="36" y="406" class="t" fill="#3FB950">APPLIED: 48 files scanned, 31 compressible, ~12,960 tokens saved</text>
